<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Adoptă-l pe {{ animal.Nume }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        /* Validări vizuale: chenar roșu dacă datele sunt incorecte la submit */
        .form-control:invalid:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
        }
        input:invalid {
            border: 2px solid #e9ecef;
        }
        /* Când utilizatorul apasă pe buton și e greșit, se aprinde roșu */
        form:is(.was-validated) .form-control:invalid {
            border-color: #dc3545;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' width='12' height='12' fill='none' stroke='%23dc3545'%3e%3ccircle cx='6' cy='6' r='4.5'/%3e%3cpath stroke-linejoin='round' d='M5.8 3.6h.4L6 6.5z'/%3e%3ccircle cx='6' cy='8.2' r='.6' fill='%23dc3545' stroke='none'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(0.375em + 0.1875rem) center;
            background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <!-- Header cu butonul în stânga sus lângă titlu -->
    <div class="header-container">
        <a href="{{ url_for('animale', id_adapost=animal.ID_Adapost) }}" class="btn btn-outline-secondary btn-sm">
            &larr; Întoarce-te la listă
        </a>
        <h1 class="mb-0">Adoptă-l pe {{ animal.Nume }}</h1>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <p class="text-muted">Vei începe procesul de adopție pentru <strong>{{ animal.Nume }}</strong> ({{ animal.Specie }}).</p>
                
                <form action="{{ url_for('proces_adoptie', id_animal=animal.ID_Animal) }}" method="POST" class="needs-validation" novalidate>
                    
                    <!-- Nume Stăpân -->
                    <div class="mb-3">
                        <label class="form-label">Nume Complet</label>
                        <input type="text" name="nume_stapan" class="form-control" placeholder="Ex: Popescu Ion" required minlength="3">
                        <div class="invalid-feedback">Te rugăm să introduci numele tău complet.</div>
                    </div>

                    <!-- Telefon cu pattern pentru format clasic -->
                    <div class="mb-3">
                        <label class="form-label">Număr Telefon</label>
                        <input type="tel" name="telefon" class="form-control" placeholder="Ex: 0722123456" 
                               required pattern="[0-9]{10,15}">
                        <div class="invalid-feedback">Introdu un număr de telefon valid (doar cifre).</div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Adresă Email</label>
                        <input type="email" name="email" class="form-control" placeholder="nume@exemplu.com" required>
                        <div class="invalid-feedback">Introdu o adresă de email validă.</div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Confirmă adopția</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Script pentru a activa validarea vizuală de la Bootstrap
    (function () {
      'use strict'
      var forms = document.querySelectorAll('.needs-validation')
      Array.prototype.slice.call(forms).forEach(function (form) {
        form.addEventListener('submit', function (event) {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }
          form.classList.add('was-validated')
        }, false)
      })
    })()
</script>

</body>
</html>
